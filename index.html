<html lang="zh-TW"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一九二八 贈品券管理系統</title>
    <link rel="stylesheet" href="./index_files/all.min.css">
    <script src="./index_files/chart.js.下載"></script>
    <script src="./index_files/xlsx.full.min.js.下載"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
            background: #1A0F0A;
            color: #F5F0E6;
            line-height: 1.6;
        }

        /* 登入頁面 */
        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: rgba(26, 15, 10, 0.95);
            border: 2px solid #D94F04;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(217, 79, 4, 0.3);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 48px;
            font-weight: bold;
            color: #D94F04;
            text-shadow: 0 0 20px rgba(217, 79, 4, 0.5);
            letter-spacing: 4px;
        }

        .system-title {
            font-size: 24px;
            color: #F5F0E6;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            color: #F5A623;
        }

        .form-group label i {
            margin-right: 8px;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            background: rgba(245, 240, 230, 0.1);
            border: 1px solid #D94F04;
            border-radius: 8px;
            color: #F5F0E6;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #F5A623;
            background: rgba(245, 240, 230, 0.15);
            box-shadow: 0 0 10px rgba(245, 166, 35, 0.3);
        }

        .form-control option {
            background: #1A0F0A;
            color: #F5F0E6;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #D94F04, #F5A623);
            border: none;
            border-radius: 8px;
            color: #F5F0E6;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(217, 79, 4, 0.4);
        }

        /* 主系統頁面 */
        .main-container {
            display: none;
            min-height: 100vh;
        }

        .main-container.active {
            display: flex;
        }

        /* 側邊欄 */
        .sidebar {
            width: 260px;
            background: rgba(26, 15, 10, 0.98);
            border-right: 2px solid #D94F04;
            padding: 20px;
            overflow-y: auto;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: transform 0.3s;
        }

        .sidebar-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #D94F04;
            margin-bottom: 20px;
        }

        .sidebar-logo {
            font-size: 32px;
            font-weight: bold;
            color: #D94F04;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .sidebar-subtitle {
            font-size: 14px;
            color: #F5A623;
        }

        .menu-item {
            padding: 12px 15px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            color: #F5F0E6;
        }

        .menu-item i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        .menu-item:hover {
            background: rgba(217, 79, 4, 0.2);
            transform: translateX(5px);
        }

        .menu-item.active {
            background: linear-gradient(135deg, #D94F04, #F5A623);
            color: #F5F0E6;
            box-shadow: 0 2px 10px rgba(217, 79, 4, 0.3);
        }

        .logout-btn {
            margin-top: 20px;
            padding: 12px;
            background: rgba(217, 79, 4, 0.3);
            border: 1px solid #D94F04;
            border-radius: 8px;
            color: #F5F0E6;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #D94F04;
        }

        /* 主內容區 */
        .main-content {
            margin-left: 260px;
            padding: 30px;
            width: calc(100% - 260px);
            min-height: 100vh;
        }

        .content-header {
            background: rgba(217, 79, 4, 0.1);
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 4px solid #D94F04;
        }

        .content-header h2 {
            color: #F5A623;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .content-header p {
            color: #F5F0E6;
            opacity: 0.8;
        }

        /* 卡片 */
        .card {
            background: rgba(26, 15, 10, 0.8);
            border: 1px solid #D94F04;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            font-size: 20px;
            color: #F5A623;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(217, 79, 4, 0.3);
        }

        /* 統計卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(217, 79, 4, 0.2), rgba(245, 166, 35, 0.1));
            border: 1px solid #D94F04;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(217, 79, 4, 0.3);
        }

        .stat-icon {
            font-size: 40px;
            color: #F5A623;
            margin-bottom: 15px;
        }

        .stat-label {
            font-size: 14px;
            color: #F5F0E6;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #F5A623;
        }

        /* 表單 */
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #F5A623;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            background: rgba(245, 240, 230, 0.1);
            border: 1px solid #D94F04;
            border-radius: 8px;
            color: #F5F0E6;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #F5A623;
            background: rgba(245, 240, 230, 0.15);
        }

        /* 按鈕 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #D94F04, #F5A623);
            color: #F5F0E6;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(217, 79, 4, 0.4);
        }

        .btn-secondary {
            background: rgba(217, 79, 4, 0.3);
            color: #F5F0E6;
            border: 1px solid #D94F04;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* 表格 */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(26, 15, 10, 0.6);
        }

        th {
            background: #D94F04;
            color: #F5F0E6;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border: 1px solid rgba(245, 166, 35, 0.3);
        }

        td {
            padding: 12px 15px;
            border: 1px solid rgba(217, 79, 4, 0.3);
            color: #F5F0E6;
        }

        tr:hover {
            background: rgba(217, 79, 4, 0.1);
        }

        /* 分析頁籤 */
        .analysis-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #D94F04;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #F5F0E6;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            color: #F5A623;
        }

        .tab-btn.active {
            color: #F5A623;
            border-bottom-color: #F5A623;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 警示訊息 */
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .alert i {
            margin-right: 12px;
            font-size: 20px;
        }

        .alert-info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid #3498db;
            color: #3498db;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.2);
            border: 1px solid #28a745;
            color: #28a745;
        }

        .alert-warning {
            background: rgba(255, 193, 7, 0.2);
            border: 1px solid #ffc107;
            color: #ffc107;
        }

        .alert-danger {
            background: rgba(220, 53, 69, 0.2);
            border: 1px solid #dc3545;
            color: #dc3545;
        }

        /* 健康度指示燈 */
        .health-indicator {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .health-excellent {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid #28a745;
        }

        .health-good {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            border: 1px solid #3498db;
        }

        .health-warning {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .health-danger {
            background: rgba(220, 53, 69, 0.2);
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        /* 圖表容器 */
        .chart-container {
            background: rgba(26, 15, 10, 0.6);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            height: 400px;
        }

        /* 手機版優化 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                width: 100%;
                padding: 15px;
            }

            .mobile-menu-btn {
                display: block;
                position: fixed;
                top: 15px;
                left: 15px;
                z-index: 101;
                background: #D94F04;
                color: #F5F0E6;
                border: none;
                padding: 12px 15px;
                border-radius: 8px;
                font-size: 20px;
                cursor: pointer;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .analysis-tabs {
                overflow-x: auto;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        .mobile-menu-btn {
            display: none;
        }

        /* 內容區塊 */
        .content-section {
            display: none;
        }

        .content-section.active {
            display: block;
        }

        /* 結果卡片 */
        .result-card {
            background: rgba(217, 79, 4, 0.1);
            border: 2px solid #D94F04;
            border-radius: 12px;
            padding: 25px;
            margin-top: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(217, 79, 4, 0.2);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #F5A623;
            font-weight: 500;
        }

        .result-value {
            color: #F5F0E6;
            font-weight: 600;
        }

        /* 跨店提醒 */
        .cross-store-alert {
            background: rgba(255, 193, 7, 0.2);
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            align-items: center;
        }

        .cross-store-alert i {
            font-size: 24px;
            color: #ffc107;
            margin-right: 15px;
        }

        /* 核銷記錄 */
        .redemption-record {
            background: rgba(40, 167, 69, 0.1);
            border-left: 4px solid #28a745;
            padding: 15px;
            margin-top: 15px;
            border-radius: 0 8px 8px 0;
        }
    </style>

<body>
    <!-- 登入頁面 -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <div class="logo-container">
                <div class="logo-text">一九二八</div>
            </div>
            <h1 class="system-title">贈品券管理系統</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-store"></i> 請選擇門店</label>
                    <select class="form-control" id="storeSelect" required="">
                        <option value="">-- 請選擇 --</option>
                        <option value="高流店">高流店</option>
                        <option value="一玖居酒屋">一玖居酒屋</option>
                        <option value="鳳山店">鳳山店</option>
                        <option value="總管理處">總管理處</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> 密碼</label>
                    <input type="password" class="form-control" id="passwordInput" placeholder="請輸入密碼" required="">
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> 登入系統
                </button>
            </form>
        </div>
    </div>

    <!-- 主系統頁面 -->
    <div class="main-container" id="mainSystem">
        <!-- 手機版選單按鈕 -->
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="fas fa-bars"></i>
        </button>

        <!-- 側邊欄 -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">一九二八</div>
                <div class="sidebar-subtitle" id="currentStore">贈品券管理系統</div>
            </div>
            <div id="menuItems"></div>
            <div class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> 登出系統
            </div>
        </div>

        <!-- 主內容區 -->
        <div class="main-content">
            <div id="mainContent"></div>
        </div>
    </div>

    <script>
        // 全域變數
        let currentStore = '';
        let currentMenu = '';
        let storeData = {
            vouchers: [],
            transactions: [],
            applications: [],
            projects: [],
            inventory: {}
        };

        // 登入密碼
        const passwords = {
            '高流店': 'gl1928',
            '一玖居酒屋': 'yj1928',
            '鳳山店': 'fs1928',
            '總管理處': 'admin1928'
        };

        // 選單配置
        const storeMenus = [
            { id: 'dashboard', icon: 'fas fa-home', label: '儀表板' },
            { id: 'apply', icon: 'fas fa-file-alt', label: '贈品券申請' },
            { id: 'inbound', icon: 'fas fa-download', label: '入券作業' },
            { id: 'issue', icon: 'fas fa-gift', label: '發券作業' },
            { id: 'redeem', icon: 'fas fa-check-circle', label: '核銷作業' },
            { id: 'query', icon: 'fas fa-search', label: '查詢作業' },
            { id: 'void', icon: 'fas fa-times-circle', label: '作廢作業' },
            { id: 'analysis', icon: 'fas fa-chart-line', label: '進階分析' }
        ];

        const adminMenus = [
            { id: 'dashboard', icon: 'fas fa-home', label: '儀表板' },
            { id: 'allocate', icon: 'fas fa-share-alt', label: '撥券作業' },
            { id: 'approve', icon: 'fas fa-check-square', label: '申請審核' },
            { id: 'project', icon: 'fas fa-project-diagram', label: '活動專案管理' },
            { id: 'inventory', icon: 'fas fa-warehouse', label: '庫存管理' },
            { id: 'analysis', icon: 'fas fa-chart-bar', label: '進階分析' }
        ];

        // 登入處理
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const store = document.getElementById('storeSelect').value;
            const password = document.getElementById('passwordInput').value;

            if (passwords[store] === password) {
                currentStore = store;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainSystem').classList.add('active');
                document.getElementById('currentStore').textContent = store;
                initializeMenu();
                loadDashboard();
            } else {
                alert('密碼錯誤，請重新輸入');
            }
        });

        // 初始化選單
        function initializeMenu() {
            const menuContainer = document.getElementById('menuItems');
            const menus = currentStore === '總管理處' ? adminMenus : storeMenus;
            
            let html = '';
            menus.forEach(menu => {
                html += `
                    <div class="menu-item" onclick="loadContent('${menu.id}')">
                        <i class="${menu.icon}"></i>
                        <span>${menu.label}</span>
                    </div>
                `;
            });
            menuContainer.innerHTML = html;
        }

        // 載入內容
        function loadContent(menuId) {
            currentMenu = menuId;
            
            // 更新選單活動狀態
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');

            // 載入對應內容
            if (currentStore === '總管理處') {
                loadAdminContent(menuId);
            } else {
                loadStoreContent(menuId);
            }

            // 關閉手機版選單
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('mobile-open');
            }
        }

        // 門店內容
        function loadStoreContent(menuId) {
            const content = document.getElementById('mainContent');
            
            switch(menuId) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'apply':
                    loadApply();
                    break;
                case 'inbound':
                    loadInbound();
                    break;
                case 'issue':
                    loadIssue();
                    break;
                case 'redeem':

        // Excel 匯出功能
        function exportToExcel(type) {
            alert(`正在匯出 ${type} 資料至 Excel（A4排版）...`);
            
            // 取得對應的表格
            const table = document.querySelector('table');
            if (!table) return;

            // 使用 SheetJS 匯出
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.table_to_sheet(table);

            // 設定欄寬
            const colWidths = [];
            const firstRow = table.querySelector('thead tr');
            firstRow.querySelectorAll('th').forEach(() => {
                colWidths.push({ wch: 15 });
            });
            ws['!cols'] = colWidths;

            // 設定頁面
            ws['!pageSetup'] = {
                paperSize: 9, // A4
                orientation: 'landscape',
                fitToWidth: 1,
                fitToHeight: 0
            };

            ws['!margins'] = {
                left: 0.59,
                right: 0.59,
                top: 0.59,
                bottom: 0.59
            };

            XLSX.utils.book_append_sheet(wb, ws, '資料');
            
            const fileName = `${currentStore}_${type}_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(wb, fileName);
        }
